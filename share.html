<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>進捗レポート | FitCoach Pro</title>
<meta name="description" content="パーソナルトレーナーが管理するトレーニング進捗レポートです。">
<meta property="og:title" content="進捗レポート | FitCoach Pro">
<meta property="og:description" content="トレーニングの成果を数字で確認しよう。">
<meta property="og:type" content="website">

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #007AFF;
    --green: #34C759;
    --red: #FF3B30;
    --amber: #FF9500;
    --bg: #0a0a0a;
    --card: #1c1c1e;
    --border: rgba(255,255,255,.08);
    --text: #ffffff;
    --sub: rgba(255,255,255,.45);
  }

  body {
    font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 40px;
  }

  .header {
    background: linear-gradient(135deg, #007AFF 0%, #00C8FF 100%);
    padding: 48px 20px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 70% 30%, rgba(255,255,255,.15) 0%, transparent 60%);
  }
  .header-logo {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: rgba(255,255,255,.7);
    margin-bottom: 12px;
    position: relative;
  }
  .header-name {
    font-size: 28px;
    font-weight: 900;
    position: relative;
    margin-bottom: 4px;
  }
  .header-sub {
    font-size: 13px;
    color: rgba(255,255,255,.75);
    position: relative;
  }
  .header-elapsed {
    display: inline-block;
    margin-top: 12px;
    padding: 5px 14px;
    background: rgba(255,255,255,.18);
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    position: relative;
  }

  .container { padding: 20px 16px; max-width: 480px; margin: 0 auto; }

  .section-title {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--sub);
    margin: 24px 0 10px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    text-align: center;
  }
  .stat-card.wide { grid-column: 1 / -1; }
  .stat-val {
    font-size: 32px;
    font-weight: 900;
    color: var(--blue);
    line-height: 1.1;
  }
  .stat-val.green { color: var(--green); }
  .stat-val.red   { color: var(--red);   }
  .stat-val.amber { color: var(--amber); }
  .stat-lbl {
    font-size: 11px;
    font-weight: 700;
    color: var(--sub);
    margin-top: 5px;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .stat-detail {
    font-size: 12px;
    color: var(--sub);
    margin-top: 4px;
  }

  .weight-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .weight-side { text-align: center; flex: 1; }
  .weight-val { font-size: 26px; font-weight: 900; }
  .weight-lbl { font-size: 10px; color: var(--sub); font-weight: 700; text-transform: uppercase; margin-top: 3px; }
  .weight-arrow {
    font-size: 22px;
    color: var(--sub);
    flex-shrink: 0;
  }
  .weight-diff {
    text-align: center;
    flex-shrink: 0;
  }
  .weight-diff-val {
    font-size: 20px;
    font-weight: 900;
  }
  .weight-diff-lbl { font-size: 10px; color: var(--sub); font-weight: 700; margin-top: 2px; }

  .pr-list { display: flex; flex-direction: column; gap: 8px; }
  .pr-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .pr-name { font-size: 14px; font-weight: 700; }
  .pr-weight { font-size: 14px; font-weight: 900; color: var(--amber); }

  .trainer-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .trainer-icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #007AFF, #00C8FF);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .trainer-name { font-size: 15px; font-weight: 800; }
  .trainer-gym  { font-size: 12px; color: var(--sub); margin-top: 2px; }

  .cta-section {
    margin-top: 32px;
    background: linear-gradient(135deg, rgba(0,122,255,.15), rgba(0,200,255,.08));
    border: 1px solid rgba(0,122,255,.25);
    border-radius: 20px;
    padding: 24px 20px;
    text-align: center;
  }
  .cta-title { font-size: 15px; font-weight: 800; margin-bottom: 6px; }
  .cta-sub   { font-size: 12px; color: var(--sub); line-height: 1.6; margin-bottom: 18px; }
  .cta-btn {
    display: inline-block;
    padding: 14px 28px;
    background: linear-gradient(135deg, #007AFF, #00C8FF);
    color: #fff;
    border-radius: 14px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: .04em;
    box-shadow: 0 8px 24px rgba(0,122,255,.35);
  }

  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 16px;
    color: var(--sub);
    font-size: 14px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,.1);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    text-align: center;
    padding: 60px 20px;
    color: var(--sub);
  }
  .error-icon { font-size: 48px; margin-bottom: 16px; }
  .error-title { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
  .error-sub   { font-size: 13px; line-height: 1.6; }
</style>
</head>
<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <div>進捗を読み込み中...</div>
</div>

<div id="app" style="display:none;"></div>

<script>
  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyDCWtx1V9XdPIjfNH24ChEz-B0VaD0iBn4",
    authDomain:        "pt-manager-57190.firebaseapp.com",
    projectId:         "pt-manager-57190",
    storageBucket:     "pt-manager-57190.firebasestorage.app",
    messagingSenderId: "504138724513",
    appId:             "1:504138724513:web:f222f564cca5a67bd6ace0"
  };

  firebase.initializeApp(FIREBASE_CONFIG);
  const db = firebase.firestore();

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function signNum(n) { return n > 0 ? '+' + n : String(n); }

  async function main() {
    const shareId = new URLSearchParams(location.search).get('id');
    if (!shareId) { showError('URLが正しくありません'); return; }

    try {
      const doc = await db.collection('publicShares').doc(shareId).get();
      if (!doc.exists) { showError('このリンクは無効または期限切れです'); return; }

      const d = doc.data();

      // 期限チェック
      if (d.expiresAt && d.expiresAt.toDate() < new Date()) {
        showError('このリンクは期限切れです（30日間有効）');
        return;
      }

      render(d);
    } catch(e) {
      console.error(e);
      showError('データの読み込みに失敗しました');
    }
  }

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('app').innerHTML = `
      <div class="error">
        <div class="error-icon">⚠️</div>
        <div class="error-title">表示できません</div>
        <div class="error-sub">${esc(msg)}</div>
      </div>
      <div class="container">
        <div class="cta-section">
          <div class="cta-title">FitCoach Pro を試してみませんか？</div>
          <div class="cta-sub">パーソナルトレーナー向けの無料管理アプリ。<br>クライアント3名まで永久無料。</div>
          <a href="https://fitcoach-pro.pages.dev" class="cta-btn">無料ではじめる</a>
        </div>
      </div>`;
  }

  function render(d) {
    document.getElementById('loading').style.display = 'none';

    // 体重変化カード
    let weightSection = '';
    if (d.weightLatest != null) {
      if (d.weightStart != null && d.weightChange != null) {
        const isBulk = d.clientGoal === '増量';
        const diffVal = d.weightChange;
        const isPositive = diffVal >= 0;
        const isGood = isBulk ? isPositive : !isPositive;
        const colorClass = diffVal === 0 ? '' : (isGood ? 'green' : 'red');
        weightSection = `
          <div class="section-title">体重の変化</div>
          <div class="weight-card">
            <div class="weight-side">
              <div class="weight-val">${d.weightStart}<small style="font-size:14px;">kg</small></div>
              <div class="weight-lbl">スタート</div>
            </div>
            <div class="weight-arrow">→</div>
            <div class="weight-side">
              <div class="weight-val">${d.weightLatest}<small style="font-size:14px;">kg</small></div>
              <div class="weight-lbl">現在</div>
            </div>
            <div class="weight-diff" style="padding:10px 14px;background:rgba(255,255,255,.05);border-radius:12px;">
              <div class="weight-diff-val ${colorClass}">${signNum(diffVal)}<small style="font-size:12px;">kg</small></div>
              <div class="weight-diff-lbl">変化量</div>
            </div>
          </div>`;
      } else {
        weightSection = `
          <div class="section-title">現在の体重</div>
          <div class="stat-card">
            <div class="stat-val">${d.weightLatest}<small style="font-size:16px;">kg</small></div>
            <div class="stat-lbl">体重</div>
          </div>`;
      }
    }

    // 体脂肪変化
    let fatSection = '';
    if (d.fatChange != null) {
      const fatColor = d.fatChange < 0 ? 'green' : 'red';
      fatSection = `
        <div class="stat-card">
          <div class="stat-val ${fatColor}">${signNum(d.fatChange)}<small style="font-size:16px;">%</small></div>
          <div class="stat-lbl">体脂肪変化</div>
        </div>`;
    }

    // PRs
    let prSection = '';
    if (d.topPRs && d.topPRs.length > 0) {
      const items = d.topPRs.map(p => `
        <div class="pr-item">
          <div class="pr-name">🏆 ${esc(p.name)}</div>
          <div class="pr-weight">${p.weight} kg</div>
        </div>`).join('');
      prSection = `
        <div class="section-title">パーソナルレコード</div>
        <div class="pr-list">${items}</div>`;
    }

    // トレーナー情報
    const trainerSection = `
      <div class="section-title">担当トレーナー</div>
      <div class="trainer-card">
        <div class="trainer-icon">💪</div>
        <div>
          <div class="trainer-name">${esc(d.trainerName || 'パーソナルトレーナー')}</div>
          ${d.gymName ? `<div class="trainer-gym">${esc(d.gymName)}</div>` : ''}
        </div>
      </div>`;

    const html = `
      <div class="header">
        <div class="header-logo">FitCoach Pro — Progress Report</div>
        <div class="header-name">${esc(d.clientName || 'クライアント')}</div>
        ${d.clientGoal ? `<div class="header-sub">目標: ${esc(d.clientGoal)}</div>` : ''}
        ${d.elapsedDays != null ? `<div class="header-elapsed">開始から ${d.elapsedDays} 日目</div>` : ''}
      </div>
      <div class="container">
        <div class="section-title">セッション実績</div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-val">${d.totalSessions || 0}</div>
            <div class="stat-lbl">総セッション数</div>
          </div>
          <div class="stat-card">
            <div class="stat-val amber">${d.monthSessions || 0}</div>
            <div class="stat-lbl">今月のセッション</div>
          </div>
        </div>

        ${weightSection}

        ${d.fatChange != null ? `<div class="stats-grid" style="margin-top:10px;">${fatSection}</div>` : ''}

        ${prSection}

        ${trainerSection}

        <div class="cta-section">
          <div class="cta-title">あなたのトレーナーも使ってみませんか？</div>
          <div class="cta-sub">FitCoach Proはパーソナルトレーナー向けの無料管理アプリ。<br>クライアント3名まで永久無料・登録30秒。</div>
          <a href="https://fitcoach-pro.pages.dev" class="cta-btn">無料ではじめる →</a>
        </div>
      </div>`;

    document.getElementById('app').innerHTML = html;
    document.getElementById('app').style.display = 'block';

    // OGタグを動的に更新
    document.title = `${d.clientName || 'クライアント'}さんの進捗 | FitCoach Pro`;
  }

  main();
</script>
</body>
</html>
