<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#080808"/>
  <!-- gradient bg -->
  <radialGradient id="bg" cx="50%" cy="0%" r="80%">
    <stop offset="0%" stop-color="#007AFF" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo icon -->
  <text x="600" y="200" font-family="-apple-system, sans-serif" font-size="96" text-anchor="middle">🏋️</text>

  <!-- App name -->
  <text x="600" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
        font-size="72" font-weight="900" text-anchor="middle" fill="#ffffff" letter-spacing="-1">FitCoach Pro</text>

  <!-- Tagline -->
  <text x="600" y="370" font-family="-apple-system, BlinkMacSystemFont, sans-serif"
        font-size="28" font-weight="600" text-anchor="middle" fill="#8a8a8e">パーソナルトレーナーのためのクライアント管理</text>

  <!-- Features row -->
  <rect x="200" y="430" width="240" height="80" rx="14" fill="#131313" stroke="#242424" stroke-width="1"/>
  <text x="320" y="468" font-family="sans-serif" font-size="22" text-anchor="middle" fill="#efefef" font-weight="700">💪 セッション記録</text>
  <text x="320" y="494" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#888">種目・重量・回数</text>

  <rect x="480" y="430" width="240" height="80" rx="14" fill="#131313" stroke="#242424" stroke-width="1"/>
  <text x="600" y="468" font-family="sans-serif" font-size="22" text-anchor="middle" fill="#efefef" font-weight="700">📊 進捗グラフ</text>
  <text x="600" y="494" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#888">体重・体脂肪・PR</text>

  <rect x="760" y="430" width="240" height="80" rx="14" fill="#131313" stroke="#242424" stroke-width="1"/>
  <text x="880" y="468" font-family="sans-serif" font-size="22" text-anchor="middle" fill="#efefef" font-weight="700">📄 進捗レポート</text>
  <text x="880" y="494" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#888">PDF生成・共有</text>

  <!-- URL -->
  <text x="600" y="590" font-family="sans-serif" font-size="20" text-anchor="middle" fill="#555">fitcoach-pro.pages.dev</text>
